<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REALai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --border:    #e0ddd9;
      --text:      #1a1a1a;
      --text-dim:  #8a8a8a;
      --accent:    #cc785c;
      --user-bg:   #ffffff;
      --claude-bg: transparent;
      --radius:    12px;
    }

    body.dark {
      --bg:        #222325;
      --surface:   #2c2d30;
      --border:    #3a3b3e;
      --text:      #f7f5f2;
      --text-dim:  #8a8a8a;
      --accent:    #cc785c;
      --user-bg:   #2c2d30;
      --claude-bg: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI Semibold', 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* Aspect ratio correction — prim screen is 1:1.556, not 1:2.
       This constrains content to match the actual visible area. */
    #aspect-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    #aspect-inner {
      width: 100%;
      aspect-ratio: 0.40604 / 0.63162;
      max-height: 100%;
      max-width: calc(100vh * 0.40604 / 0.63162);
      overflow: hidden;
      position: relative;
    }

    /* ===================== OFF SCREEN ===================== */

    #off-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #222325;
    }

    #off-screen.visible {
      display: block;
    }

    #off-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===================== CHAT APP ===================== */

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100%;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    #header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }

    #live-chat {
      flex: 1;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    #live-chat .live {
      color: var(--accent);
      text-transform: uppercase;
    }

    #live-chat .chat {
      color: var(--text);
      text-transform: uppercase;
      opacity: 0.6;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c0bdb9;
      transition: background 0.4s;
      flex-shrink: 0;
    }

    #status-dot.active {
      background: #5a9e6a;
      box-shadow: 0 0 6px #5a9e6a88;
    }

    #status-dot.thinking {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 8px 0 3px 2px;
    }

    .msg-label.claude { color: var(--accent); opacity: 0.9; }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: var(--radius);
      font-family: 'Segoe UI Semibold', 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
      max-width: 100%;
      word-wrap: break-word;
    }

    .msg-bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .msg-bubble.assistant {
      background: var(--claude-bg);
      border: none;
      padding-left: 2px;
      color: var(--text);
    }

    #thinking {
      display: none;
      padding: 6px 2px;
      animation: fadeUp 0.2s ease forwards;
    }

    #thinking.visible { display: flex; align-items: center; gap: 5px; }

    .think-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: blink 1.2s ease-in-out infinite;
    }

    .think-dot:nth-child(2) { animation-delay: 0.2s; }
    .think-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.3;
      pointer-events: none;
      padding-bottom: 40px;
    }

    #empty-logo {
      height: 28px;
      width: auto;
    }

    #empty-logo path {
      fill: var(--text);
    }

    #empty p {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
      max-width: 160px;
    }

    /* ===================== FOOTER ===================== */

    #footer {
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .footer-btn {
      font-size: 13px;
      font-weight: 600;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }

    .footer-btn:hover {
      color: var(--text);
      background: var(--border);
      border-color: var(--text-dim);
    }

    .footer-btn.highlight {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--bg);
    }

    .footer-btn.highlight:hover {
      background: var(--accent);
      color: #ffffff;
    }

    #pastebin-btn {
      display: none;
    }

    #pastebin-btn.visible {
      display: block;
    }
  </style>
</head>
<body>

<!-- OFF SCREEN -->
<div id="off-screen" class="visible">
  <img src="/REALai_HUD_OFF.png" alt="" />
</div>

<!-- CHAT APP -->
<div id="aspect-wrap" style="display:none;">
<div id="aspect-inner">
<div id="app">

  <div id="header">
    <div id="live-chat"><span class="live">Live</span> <span class="chat">Chat</span></div>
    <div id="status-dot"></div>
  </div>

  <div id="messages">
    <div id="empty">
      <svg id="empty-logo" viewBox="0 0 1413.562 319.284" xmlns="http://www.w3.org/2000/svg">
        <path d="M480.206,1132.98H614.295l-59.87-99.37c31.172-20.16,49.48-54.845,49.48-97.97,0-71.25-48.985-116.719-124.194-116.719H316.923V1132.98H431.715v-80.62h10.391Zm-13.36-213.746c14.844,0,22.266,6.094,22.266,18.75,0,12.187-7.422,18.75-22.266,18.75H431.715v-37.5h35.131Zm389.238-1.406V818.921H626.993V1132.98H856.084v-98.9h-114.3v-15.94H835.8V932.828H741.786v-15h114.3ZM1061.99,1132.98h126.17L1109,818.921H946.209L867.536,1132.98H989.751l5.443-33.75h61.356Zm-51.46-131.25,11.38-73.59h6.93l11.87,73.59h-30.18Zm305.36,30.94V818.921H1201.1V1132.98h219.19V1032.67h-104.4Zm324.29-26.69q0-90.681-98.02-90.684-21.045,0-46.66,5.395-25.635,5.4-40.4,12.452v49.389q36.93-22.615,77.88-22.619,40.74,0,40.73,34.863l-62.21,7.674q-79.005,9.555-79,71.39,0,29.265,19.13,46.8t52.48,17.53q45.21,0,68.26-35.69h0.9v30.5h66.91v-127Zm-79,72.95q-12.54,12.75-32.45,12.76-14.325,0-22.71-7.16a23.046,23.046,0,0,1-8.4-18.37q0-24.69,34.47-28.84l41.62-4.98v14.32Q1573.71,1066.16,1561.18,1078.93ZM1719.2,877.32a30.617,30.617,0,0,0,11.3-24.487,29.815,29.815,0,0,0-11.3-24.073q-11.31-9.338-29.43-9.338-17.91,0-29.32,9.338a29.684,29.684,0,0,0-11.41,24.073q0,14.318,11.41,24.176t29.32,9.857Q1707.9,886.866,1719.2,877.32Zm5.48,43.164h-70.72v212.5h70.72v-212.5Z" transform="translate(-316.938 -818.906)"/>
      </svg>
      <p>Type in local chat<br>to start</p>
    </div>
    <div id="thinking">
      <div class="think-dot"></div>
      <div class="think-dot"></div>
      <div class="think-dot"></div>
    </div>
  </div>

  <div id="footer">
    <button class="footer-btn" onclick="refreshView()">Refresh</button>
    <button class="footer-btn" onclick="loadHistory()">Load</button>
    <button class="footer-btn" onclick="exportChat()">Export</button>
    <button class="footer-btn highlight" id="pastebin-btn" onclick="openHandoff()">Open in Pastebin</button>
  </div>

</div>
</div>
</div>

<script>
  const RELAY = window.location.origin;
  let avatarUuid = null;
  let userMessageShown = false;
  let chatWasActive = false;
  let pendingHandoff = null;

  const offScreen  = document.getElementById('off-screen');
  const aspectWrap = document.getElementById('aspect-wrap');
  const appEl      = document.getElementById('app');
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const thinkingEl = document.getElementById('thinking');
  const statusDot  = document.getElementById('status-dot');
  const pastebinBtn = document.getElementById('pastebin-btn');

  const urlParams = new URLSearchParams(window.location.search);
  const urlUuid = urlParams.get('uuid');

  function showOffScreen() {
    offScreen.classList.add('visible');
    aspectWrap.style.display = 'none';
  }

  function showChatApp() {
    offScreen.classList.remove('visible');
    aspectWrap.style.display = 'flex';
  }

  function clearMessages() {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyEl);
    messagesEl.appendChild(thinkingEl);
    emptyEl.style.display = '';
    hideThinking();
  }

  function refreshView() {
    if (!avatarUuid) return;
    const url = RELAY + '?uuid=' + avatarUuid;
    window.location.href = url;
  }

  async function loadHistory() {
    if (!avatarUuid) return;
    try {
      const res = await fetch(`${RELAY}/history?uuid=${avatarUuid}`);
      if (!res.ok) return;
      const data = await res.json();

      if (data.dark) {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }

      if (data.messages && data.messages.length > 0) {
        clearMessages();
        emptyEl.style.display = 'none';
        data.messages.forEach(msg => {
          addMessage(msg.role === 'user' ? 'user' : 'assistant', msg.text, '', true);
        });
      }
    } catch(e) {}
  }

  async function exportChat() {
    if (!avatarUuid) return;
    try {
      const res = await fetch(`${RELAY}/history?uuid=${avatarUuid}`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.messages || data.messages.length === 0) return;

      let content = '';
      data.messages.forEach(msg => {
        const role = msg.role === 'user' ? 'You' : 'REALai';
        content += role + ':\n' + msg.text + '\n\n';
      });

      const pbRes = await fetch(`${RELAY}/pastebin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, title: 'REALai HUD Export' })
      });
      const pbData = await pbRes.json();
      if (pbData.url) {
        window.open(pbData.url, '_blank');
      }
    } catch(e) {}
  }

  async function openHandoff() {
    if (!pendingHandoff) return;
    try {
      const pbRes = await fetch(`${RELAY}/pastebin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: pendingHandoff, title: 'REALai Handoff' })
      });
      const pbData = await pbRes.json();
      if (pbData.url) {
        window.open(pbData.url, '_blank');
        pendingHandoff = null;
        pastebinBtn.classList.remove('visible');
      }
    } catch(e) {}
  }

  async function checkHandoff() {
    if (!avatarUuid) return;
    try {
      const res = await fetch(`${RELAY}/gethandoff?uuid=${avatarUuid}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data.content) {
        pendingHandoff = data.content;
        pastebinBtn.classList.add('visible');
      }
    } catch(e) {}
  }

  async function initHistory(uuid) {
    try {
      const res = await fetch(`${RELAY}/history?uuid=${uuid}`);
      if (!res.ok) return;
      const data = await res.json();

      if (data.dark) {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
    } catch(e) {}
  }

  async function getLatestUuid() {
    try {
      const res = await fetch(`${RELAY}/latest`);
      const data = await res.json();
      if (data.avatar_uuid) {
        avatarUuid = data.avatar_uuid;
        statusDot.className = 'active';
        await initHistory(avatarUuid);
      }
    } catch(e) {}
  }

  async function poll() {
    try {
      const res = await fetch(`${RELAY}/poll?uuid=${avatarUuid || ''}`);
      if (!res.ok) return;
      const data = await res.json();

      if (data.avatar_uuid && !avatarUuid) {
        avatarUuid = data.avatar_uuid;
        statusDot.className = 'active';
        await initHistory(avatarUuid);
      }

      if (typeof data.dark !== 'undefined') {
        if (data.dark) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
      }

      // Handle chat ON/OFF state
      if (typeof data.chat_active !== 'undefined') {
        if (data.chat_active) {
          if (!chatWasActive) {
            clearMessages();
            showChatApp();
            statusDot.className = 'active';
          }
          chatWasActive = true;
        } else {
          chatWasActive = false;
          showOffScreen();
          return;
        }
      }

      let slTime = '';

      if (data.user_message && !userMessageShown) {
        userMessageShown = true;
        hideThinking();

        let timeMatch = data.user_message.match(/SL (\d+:\d+)/);
        slTime = timeMatch ? timeMatch[1] + ' SL' : '';

        let userMsg = data.user_message.replace(/\[Context:.*?\]\s*/, '');
        addMessage('user', userMsg, slTime);
        showThinking();
      }

      if (data.reply) {
        userMessageShown = false;
        hideThinking();
        addMessage('assistant', data.reply, slTime);
        statusDot.className = 'active';
        await checkHandoff();
      }

    } catch(e) {}
  }

  function addMessage(role, text, time = '', silent = false) {
    emptyEl.style.display = 'none';

    const group = document.createElement('div');
    group.className = 'msg-group';
    if (silent) group.style.animation = 'none';

    const label = document.createElement('div');
    label.className = `msg-label ${role === 'user' ? 'you' : 'claude'}`;
    label.textContent = (role === 'user' ? 'You' : 'REALai') + (time ? '  ' + time : '');

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role === 'user' ? 'user' : 'assistant'}`;
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    group.appendChild(label);
    group.appendChild(bubble);

    messagesEl.insertBefore(group, thinkingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showThinking() {
    thinkingEl.classList.add('visible');
    statusDot.className = 'thinking';
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideThinking() {
    thinkingEl.classList.remove('visible');
  }

  async function init() {
    if (urlUuid) {
      avatarUuid = urlUuid;
      statusDot.className = 'active';
      await initHistory(avatarUuid);
    } else {
      await getLatestUuid();
    }
    poll();
  }

  setInterval(poll, 1500);
  setInterval(checkHandoff, 5000);
  setInterval(() => fetch(`${RELAY}/ping`), 600000);
  init();
</script>
</body>
</html>
